name: Build jmake
on:
  push:
    # Run on every branch so regressions can be caught on feature
    # branches before merge. The badge-update step at the end only
    # commits when running on main, so non-main pushes are test-only.
    branches: ['**']
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/stormj-uh/jonerix:builder-amd64
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          cd $GITHUB_WORKSPACE
          curl -sL -H "Authorization: token ${TOKEN}" \
            "${SERVER}/${REPO}/archive/${SHA}.tar.gz" | \
            tar xz --strip-components=1
          ls Cargo.toml && echo "Checkout OK"

      - name: Build and package with jpkg
        env:
          JPKG_SOURCE_DIR: ${{ github.workspace }}
        run: |
          jpkg build packages/jmake --build-jpkg --output /tmp/jpkg-out
          # Extract binary from jpkg (magic:8 + hdrlen:4 + header + zstd tar)
          PKG=$(ls /tmp/jpkg-out/jmake-*.jpkg)
          HDRLEN=$(dd if="$PKG" bs=1 skip=8 count=4 2>/dev/null | python3 -c "import sys; d=sys.stdin.buffer.read(); print(int.from_bytes(d,'little'))")
          SKIP=$((12 + HDRLEN))
          dd if="$PKG" bs=1 skip=$SKIP 2>/dev/null | zstdcat | tar x -C /
          echo "Installed jmake from jpkg"
          ls -la /bin/jmake

      - name: Verify binary
        run: |
          echo 'all:;@echo "jmake works"' > /tmp/test.mk
          jmake -f /tmp/test.mk

      - name: Run GNU Make test suite
        id: tests
        # Hard gate: the job FAILS if the test-suite failure count exceeds
        # MAX_ALLOWED_FAILS. We keep `continue-on-error: false` so regressions
        # cannot silently land on main (this was exactly how commits 6c9dd2f,
        # b007f29, 76887fd slipped through and broke 9 tests on 2026-04-12/13).
        run: |
          set +e
          # Pinned baseline: since jmake 1.0.15 the previously-failing
          # features/temp_stdin test passes 8/8 (verified on aarch64
          # Linux 2026-04-20). The 1.0.14 baseline allowed
          # MAX_ALLOWED_FAILS=1 for that single test; now that it's
          # clear we tighten to 0. Raise this number only with a
          # commit that explains which test moved into the
          # "expected-fail" set and why.
          MAX_ALLOWED_FAILS=0
          cd /tmp
          EXPECTED_SHA256="dd16fb1d67bfab79a72f5e8390735c49e3e8e70b4945a15ab1f81ddb78658fb3"

          # Use vendored tarball (fallback: download from GNU FTP)
          if [ -f "$GITHUB_WORKSPACE/tests/vendor/make-4.4.1.tar.gz" ]; then
            echo "Using vendored GNU Make 4.4.1 test suite"
            cp "$GITHUB_WORKSPACE/tests/vendor/make-4.4.1.tar.gz" make.tar.gz
          else
            echo "Downloading GNU Make 4.4.1 test suite..."
            curl -sfL https://ftp.gnu.org/gnu/make/make-4.4.1.tar.gz -o make.tar.gz
            if [ $? -ne 0 ]; then
              echo "Failed to download test suite"
              exit 0
            fi
          fi

          # Verify hash
          ACTUAL_SHA256=$(sha256sum make.tar.gz 2>/dev/null | cut -d' ' -f1 || shasum -a 256 make.tar.gz | cut -d' ' -f1)
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "ERROR: SHA-256 mismatch!"
            echo "  Expected: $EXPECTED_SHA256"
            echo "  Actual:   $ACTUAL_SHA256"
            exit 1
          fi
          echo "SHA-256 verified: $ACTUAL_SHA256"

          tar xzf make.tar.gz
          cd make-4.4.1
          # Create config-flags.pm directly (./configure needs bash, container has mksh)
          printf '%%CONFIG_FLAGS = (AR=>"ar",CC=>"cc",CFLAGS=>"-O2",CPP=>"cc -E",CPPFLAGS=>"",LDFLAGS=>"",LIBS=>"",USE_SYSTEM_GLOB=>"no");\n1;\n' > tests/config-flags.pm

          # Create a non-root user for testing. Some tests (e.g. temp_stdin)
          # rely on filesystem permission checks that root bypasses.
          # The builder image is minimal, so create user entries manually.
          echo 'testuser:x:1000:1000::/tmp/testhome:/bin/mksh' >> /etc/passwd
          echo 'testuser:x:1000:' >> /etc/group
          mkdir -p /tmp/testhome
          chown -R 1000:1000 /tmp/testhome /tmp/make-4.4.1
          # Make jmake binary and its libs readable/executable by testuser
          chmod a+rx $(which jmake)

          MAKE_BIN=$(which jmake)
          cd tests

          TOTAL_PASS=0
          TOTAL_FAIL=0
          for cat in $(find scripts -type f | sed 's|^scripts/||' | sort); do
            # Skip test_template (meta test, not a real make behavior test)
            case "$cat" in test_template) continue;; esac
            rm -rf work
            output=$(su testuser -c "cd /tmp/make-4.4.1/tests && perl run_make_tests.pl -make $MAKE_BIN $cat" 2>&1)
            result=$(echo "$output" | grep -oE '[0-9]+/[0-9]+ passed|Complete' | tail -1)
            if echo "$result" | grep -q Complete; then
              total=$(echo "$output" | grep -oE '[0-9]+ Tests' | head -1 | grep -oE '[0-9]+')
              TOTAL_PASS=$((TOTAL_PASS + ${total:-0}))
            elif echo "$result" | grep -qE '[0-9]+/[0-9]+'; then
              pass=$(echo "$result" | cut -d/ -f1)
              total=$(echo "$result" | grep -oE '/[0-9]+' | sed 's|/||')
              TOTAL_PASS=$((TOTAL_PASS + pass))
              TOTAL_FAIL=$((TOTAL_FAIL + total - pass))
              echo "FAIL: $cat - $result"
            fi
          done

          TOTAL=$((TOTAL_PASS + TOTAL_FAIL))
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$((TOTAL_PASS * 1000 / TOTAL))
            PCT_INT=$((PCT / 10))
            PCT_DEC=$((PCT % 10))
            BADGE="**GNU Make 4.4.1 test suite: ${TOTAL_PASS} / ${TOTAL} (${PCT_INT}.${PCT_DEC}%)**"
          else
            BADGE="**GNU Make 4.4.1 test suite: unknown**"
          fi

          echo "PASS=$TOTAL_PASS" >> $GITHUB_OUTPUT
          echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT
          echo "FAIL=$TOTAL_FAIL" >> $GITHUB_OUTPUT
          echo "BADGE=$BADGE" >> $GITHUB_OUTPUT
          echo "$BADGE"

          # Hard gate. This is THE check that blocks regressions from
          # landing on main. Do NOT add `continue-on-error: true` here
          # and do NOT relax MAX_ALLOWED_FAILS without a commit explaining
          # the new baseline and which test moved into the "expected-fail" set.
          if [ "$TOTAL_FAIL" -gt "$MAX_ALLOWED_FAILS" ]; then
            echo ""
            echo "::error::GNU Make test suite regressed: $TOTAL_FAIL failures > MAX_ALLOWED_FAILS=$MAX_ALLOWED_FAILS"
            echo "::error::Fix the regression or justify a higher baseline in this workflow."
            exit 1
          fi
          echo "OK: $TOTAL_FAIL failure(s) <= MAX_ALLOWED_FAILS=$MAX_ALLOWED_FAILS"

      - name: Update README badge
        # Only update the README badge on main so feature branches
        # don't thrash the badge with intermediate test numbers.
        if: github.ref == 'refs/heads/main'
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          BADGE: ${{ steps.tests.outputs.BADGE }}
        run: |
          if [ -z "$BADGE" ]; then
            echo "No test results, skipping README update"
            exit 0
          fi
          # Replace badge line between markers
          awk -v badge="$BADGE" '
            /<!-- test-badge-start -->/{print; print badge; skip=1; next}
            /<!-- test-badge-end -->/{skip=0}
            !skip{print}
          ' README.md > README.tmp && mv README.tmp README.md
          echo "Updated badge to: $BADGE"
          # Push via API
          CONTENT=$(base64 -w 0 < README.md 2>/dev/null || base64 < README.md | awk '{printf "%s",$0}')
          SHA=$(curl -s -H "Authorization: token ${TOKEN}" \
            "${SERVER}/api/v1/repos/${REPO}/contents/README.md" | \
            sed -n 's/.*"sha":"\([^"]*\)".*/\1/p' | head -1)
          curl -s -X PUT -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${SERVER}/api/v1/repos/${REPO}/contents/README.md" \
            -d "{\"message\":\"CI: update test badge [skip ci]\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"
          echo "README pushed"

      - name: Upload package
        # Publish the built jpkg only from main. Non-main branches are
        # test-only and should not leak intermediate builds into the
        # generic package registry.
        if: github.ref == 'refs/heads/main'
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          SERVER: ${{ github.server_url }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          ls -lh /tmp/jpkg-out/
          for f in /tmp/jpkg-out/*; do
            FNAME=$(basename "$f")
            curl -s -X PUT -H "Authorization: token ${TOKEN}" \
              --upload-file "$f" \
              "${SERVER}/api/packages/jonerik/generic/jmake/${VERSION}/${FNAME}"
            echo "Uploaded ${FNAME}"
          done
          echo "Package: ${SERVER}/jonerik/-/packages/generic/jmake/${VERSION}"
