name: Build jmake
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/stormj-uh/jonerix:builder-amd64
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          cd $GITHUB_WORKSPACE
          curl -sL -H "Authorization: token ${TOKEN}" \
            "${SERVER}/${REPO}/archive/${SHA}.tar.gz" | \
            tar xz --strip-components=1
          ls Cargo.toml && echo "Checkout OK"

      - name: Build and package with jpkg
        env:
          JPKG_SOURCE_DIR: ${{ github.workspace }}
        run: jpkg build packages/jmake --build-jpkg --output /tmp/jpkg-out

      - name: Verify binary
        run: |
          # Extract jmake from jpkg package for testing
          cd /tmp/jpkg-out
          # jpkg format: 8-byte magic + 4-byte header len + TOML header + zstd payload
          # Extract the binary from the package using jpkg itself or test from build dir
          JMAKE=$(find /tmp/jpkg-build-jmake-*/src/target/release -name jmake -type f 2>/dev/null | head -1)
          if [ -z "$JMAKE" ]; then
            echo "Binary not found in build dir, skipping verify"
            exit 0
          fi
          echo 'all:;@echo "jmake works"' > /tmp/test.mk
          "$JMAKE" -f /tmp/test.mk

      - name: Run GNU Make test suite
        id: tests
        continue-on-error: true
        run: |
          set +e
          cd /tmp
          echo "Downloading GNU Make 4.4.1 test suite..."
          curl -sfL https://ftp.gnu.org/gnu/make/make-4.4.1.tar.gz -o make.tar.gz
          if [ $? -ne 0 ]; then
            echo "Failed to download test suite"
            exit 0
          fi
          tar xzf make.tar.gz
          MAKE_BIN=$(find /tmp/jpkg-build-jmake-*/src/target/release -name jmake -type f 2>/dev/null | head -1)
          cd make-4.4.1/tests

          TOTAL_PASS=0
          TOTAL_FAIL=0
          for cat in $(find scripts -type f | sed 's|^scripts/||' | sort); do
            rm -rf work
            result=$(perl run_make_tests.pl -make "$MAKE_BIN" "$cat" 2>&1 | grep -oE '[0-9]+/[0-9]+ passed|Complete' | tail -1)
            if echo "$result" | grep -q Complete; then
              total=$(perl run_make_tests.pl -make "$MAKE_BIN" "$cat" 2>&1 | grep -oE '[0-9]+ Tests' | head -1 | grep -oE '[0-9]+')
              TOTAL_PASS=$((TOTAL_PASS + ${total:-0}))
            elif echo "$result" | grep -qE '[0-9]+/[0-9]+'; then
              pass=$(echo "$result" | cut -d/ -f1)
              total=$(echo "$result" | grep -oE '/[0-9]+' | sed 's|/||')
              TOTAL_PASS=$((TOTAL_PASS + pass))
              TOTAL_FAIL=$((TOTAL_FAIL + total - pass))
            fi
          done

          TOTAL=$((TOTAL_PASS + TOTAL_FAIL))
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$((TOTAL_PASS * 1000 / TOTAL))
            PCT_INT=$((PCT / 10))
            PCT_DEC=$((PCT % 10))
            BADGE="**GNU Make 4.4.1 test suite: ${TOTAL_PASS} / ${TOTAL} (${PCT_INT}.${PCT_DEC}%)**"
          else
            BADGE="**GNU Make 4.4.1 test suite: unknown**"
          fi

          echo "PASS=$TOTAL_PASS" >> $GITHUB_OUTPUT
          echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT
          echo "BADGE=$BADGE" >> $GITHUB_OUTPUT
          echo "$BADGE"

      - name: Update README badge
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          BADGE: ${{ steps.tests.outputs.BADGE }}
        run: |
          if [ -z "$BADGE" ]; then
            echo "No test results, skipping README update"
            exit 0
          fi
          # Replace badge line between markers
          awk -v badge="$BADGE" '
            /<!-- test-badge-start -->/{print; print badge; skip=1; next}
            /<!-- test-badge-end -->/{skip=0}
            !skip{print}
          ' README.md > README.tmp && mv README.tmp README.md
          echo "Updated badge to: $BADGE"
          # Push via API
          CONTENT=$(base64 -w 0 < README.md 2>/dev/null || base64 < README.md | awk '{printf "%s",$0}')
          SHA=$(curl -s -H "Authorization: token ${TOKEN}" \
            "${SERVER}/api/v1/repos/${REPO}/contents/README.md" | \
            sed -n 's/.*"sha":"\([^"]*\)".*/\1/p' | head -1)
          curl -s -X PUT -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${SERVER}/api/v1/repos/${REPO}/contents/README.md" \
            -d "{\"message\":\"CI: update test badge\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"
          echo "README pushed"

      - name: Upload package
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          SERVER: ${{ github.server_url }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          ls -lh /tmp/jpkg-out/
          for f in /tmp/jpkg-out/*; do
            FNAME=$(basename "$f")
            curl -s -X PUT -H "Authorization: token ${TOKEN}" \
              --upload-file "$f" \
              "${SERVER}/api/packages/jonerik/generic/jmake/${VERSION}/${FNAME}"
            echo "Uploaded ${FNAME}"
          done
          echo "Package: ${SERVER}/jonerik/-/packages/generic/jmake/${VERSION}"
