name: Build jmake
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/stormj-uh/jonerix:builder-amd64
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          cd $GITHUB_WORKSPACE
          curl -sL -H "Authorization: token ${TOKEN}" \
            "${SERVER}/${REPO}/archive/${SHA}.tar.gz" | \
            tar xz --strip-components=1
          ls Cargo.toml && echo "Checkout OK"

      - name: Build jmake
        env:
          CC: clang
          RUSTFLAGS: "-C linker=clang -C link-self-contained=yes"
        run: |
          # Create stub libgcc_s.so - musl/clang image lacks GCC runtime but
          # rustc unconditionally links -lgcc_s for proc-macro shared objects.
          # The actual unwinding is handled by Rust's bundled libunwind.a.
          SYSROOT=$(rustc --print sysroot)
          clang -shared -nostdlib -o ${SYSROOT}/lib/rustlib/x86_64-unknown-linux-musl/lib/self-contained/libgcc_s.so -x c /dev/null
          cargo build --release

      - name: Verify binary
        run: |
          echo 'all:;@echo "jmake works"' > /tmp/test.mk
          ./target/release/jmake -f /tmp/test.mk

      - name: Run GNU Make test suite
        id: tests
        continue-on-error: true
        run: |
          set +e
          cd /tmp
          echo "Downloading GNU Make 4.4.1 test suite..."
          curl -sfL https://ftp.gnu.org/gnu/make/make-4.4.1.tar.gz -o make.tar.gz
          if [ $? -ne 0 ]; then
            echo "Failed to download test suite"
            exit 0
          fi
          tar xzf make.tar.gz
          MAKE_BIN=$GITHUB_WORKSPACE/target/release/jmake
          cd make-4.4.1/tests

          TOTAL_PASS=0
          TOTAL_FAIL=0
          for cat in $(find scripts -type f | sed 's|^scripts/||' | sort); do
            rm -rf work
            result=$(perl run_make_tests.pl -make "$MAKE_BIN" "$cat" 2>&1 | grep -oE '[0-9]+/[0-9]+ passed|Complete' | tail -1)
            if echo "$result" | grep -q Complete; then
              total=$(perl run_make_tests.pl -make "$MAKE_BIN" "$cat" 2>&1 | grep -oE '[0-9]+ Tests' | head -1 | grep -oE '[0-9]+')
              TOTAL_PASS=$((TOTAL_PASS + ${total:-0}))
            elif echo "$result" | grep -qE '[0-9]+/[0-9]+'; then
              pass=$(echo "$result" | cut -d/ -f1)
              total=$(echo "$result" | grep -oE '/[0-9]+' | sed 's|/||')
              TOTAL_PASS=$((TOTAL_PASS + pass))
              TOTAL_FAIL=$((TOTAL_FAIL + total - pass))
            fi
          done

          TOTAL=$((TOTAL_PASS + TOTAL_FAIL))
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$((TOTAL_PASS * 1000 / TOTAL))
            PCT_INT=$((PCT / 10))
            PCT_DEC=$((PCT % 10))
            BADGE="**GNU Make 4.4.1 test suite: ${TOTAL_PASS} / ${TOTAL} (${PCT_INT}.${PCT_DEC}%)**"
          else
            BADGE="**GNU Make 4.4.1 test suite: unknown**"
          fi

          echo "PASS=$TOTAL_PASS" >> $GITHUB_OUTPUT
          echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT
          echo "BADGE=$BADGE" >> $GITHUB_OUTPUT
          echo "$BADGE"

      - name: Package
        run: |
          mkdir -p /tmp/jpkg/bin
          cp target/release/jmake /tmp/jpkg/bin/jmake
          ln -sf jmake /tmp/jpkg/bin/make
          llvm-strip --strip-all /tmp/jpkg/bin/jmake 2>/dev/null || true
          cd /tmp/jpkg
          VERSION=$(grep '^version' $GITHUB_WORKSPACE/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tar czf /tmp/jmake-${VERSION}-x86_64.tar.gz .
# v2
