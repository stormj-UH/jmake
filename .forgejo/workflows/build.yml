name: Build jmake
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build jmake
        run: cargo build --release

      - name: Verify binary
        run: |
          echo 'all:;@echo "jmake works"' > /tmp/test.mk
          ./target/release/jmake -f /tmp/test.mk

      - name: Run GNU Make test suite
        id: tests
        run: |
          cd /tmp
          curl -sL https://ftp.gnu.org/gnu/make/make-4.4.1.tar.gz | tar xz
          MAKE_BIN=$GITHUB_WORKSPACE/target/release/jmake
          cd make-4.4.1/tests

          TOTAL_PASS=0
          TOTAL_FAIL=0
          for cat in $(find scripts -mindepth 2 -maxdepth 2 -type f | sed 's|^scripts/||' | sort); do
            rm -rf work
            result=$(perl run_make_tests.pl -make "$MAKE_BIN" "$cat" 2>&1 | grep -oE '[0-9]+/[0-9]+ passed|Complete' | tail -1)
            if echo "$result" | grep -q Complete; then
              total=$(perl run_make_tests.pl -make "$MAKE_BIN" "$cat" 2>&1 | grep -oE '[0-9]+ Tests' | head -1 | grep -oE '[0-9]+')
              TOTAL_PASS=$((TOTAL_PASS + ${total:-0}))
            elif echo "$result" | grep -qE '[0-9]+/[0-9]+'; then
              pass=$(echo "$result" | cut -d/ -f1)
              total=$(echo "$result" | grep -oE '/[0-9]+' | sed 's|/||')
              TOTAL_PASS=$((TOTAL_PASS + pass))
              TOTAL_FAIL=$((TOTAL_FAIL + total - pass))
            fi
          done

          TOTAL=$((TOTAL_PASS + TOTAL_FAIL))
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$((TOTAL_PASS * 1000 / TOTAL))
            PCT_INT=$((PCT / 10))
            PCT_DEC=$((PCT % 10))
            BADGE="**GNU Make 4.4.1 test suite: ${TOTAL_PASS} / ${TOTAL} (${PCT_INT}.${PCT_DEC}%)**"
          else
            BADGE="**GNU Make 4.4.1 test suite: unknown**"
          fi

          echo "PASS=$TOTAL_PASS" >> $GITHUB_OUTPUT
          echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT
          echo "BADGE=$BADGE" >> $GITHUB_OUTPUT
          echo "$BADGE"

      - name: Update README with test results
        run: |
          cd $GITHUB_WORKSPACE
          BADGE="${{ steps.tests.outputs.BADGE }}"
          if [ -n "$BADGE" ]; then
            sed -i '/<!-- test-badge-start -->/,/<!-- test-badge-end -->/{
              /<!-- test-badge-start -->/!{/<!-- test-badge-end -->/!d}
              /<!-- test-badge-start -->/a\'"$BADGE"'
            }' README.md
            git config user.name "Forgejo CI"
            git config user.email "ci@jonerix"
            git add README.md
            git diff --cached --quiet || git commit -m "CI: update test results in README [skip ci]"
            git push || true
          fi

      - name: Package
        run: |
          mkdir -p /tmp/jpkg/bin
          cp target/release/jmake /tmp/jpkg/bin/jmake
          ln -sf jmake /tmp/jpkg/bin/make
          strip --strip-all /tmp/jpkg/bin/jmake 2>/dev/null || true
          cd /tmp/jpkg
          VERSION=$(grep '^version' $GITHUB_WORKSPACE/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tar czf /tmp/jmake-${VERSION}-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: jmake-x86_64
          path: /tmp/jmake-*-x86_64.tar.gz
