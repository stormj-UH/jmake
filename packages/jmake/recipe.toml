[package]
name = "jmake"
version = "0.1.0"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"

[source]
type = "local"

[build]
system = "custom"
build = """SYSROOT=$(rustc --print sysroot)
clang -shared -nostdlib -o ${SYSROOT}/lib/rustlib/x86_64-unknown-linux-musl/lib/self-contained/libgcc_s.so -x c /dev/null 2>/dev/null || true
CC=clang RUSTFLAGS="-C linker=clang -C link-self-contained=yes" cargo build --release"""
install = """install -Dm755 target/release/jmake $DESTDIR/bin/jmake
ln -sf jmake $DESTDIR/bin/make
llvm-strip --strip-all $DESTDIR/bin/jmake 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
